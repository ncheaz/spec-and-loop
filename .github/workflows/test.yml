name: Test Suite

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [24]
    
    runs-on: ${{ matrix.os }}
    
    name: Test on ${{ matrix.os }} (Node.js ${{ matrix.node-version }})
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install system dependencies on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y bats-core jq shellcheck
      
      - name: Install system dependencies on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew install bats-core jq shellcheck
      
      - name: Install npm dependencies
        run: npm ci
      
      - name: Run shellcheck linting
        run: npm run lint
      
      - name: Run unit tests
        if: github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'unit'
        run: npm run test:unit
      
      - name: Run integration tests
        if: github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == 'integration'
        run: npm run test:integration
      
      - name: Run all tests
        if: github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all'
        run: npm test
      
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            test-output/
            *.log
          retention-days: 30
      
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            coverage/
            coverage/lcov-report/
            coverage/coverage.json
          retention-days: 90
